project_name: aina-code-500m-8k
output_mode: pretrain
artifact_format: tokenized_binary_shards
target_tokens: 10000000000
sequence_length: 8192
tokens_per_sample: 8192
loss_shift: model_internal
val_ratio: 0.001
seed: 42

tokenizer_path: /data/aina-tokenizer
fallback_tokenizer: gpt2
output_dir: /data/aina-dataset/pretrain/aina-code-500m-10b-8k
work_dir: /data/aina-dataset/work/pretrain-500m-10b-8k
progress_path: /data/aina-dataset/work/pretrain-500m-10b-8k/progress.json
report_path: /data/aina-dataset/work/pretrain-500m-10b-8k/reports/dataset_report.json

s3_output: s3://aina-code-datasets/v1/pretrain/aina-code-500m-10b-8k/

base_ratio: 0.97
mixed_instruct_ratio: 0.03
checkpoint_interval_tokens: 50000000
s3_upload_interval_tokens: 50000000
shard_sequences: 16384
write_intermediate_jsonl: false
num_workers: 24
worker_batch_size: 32
worker_start_method: fork
log_interval_seconds: 60

sources:
  - name: mbpp
    type: instruct
    mix_role: mixed_instruct
    hf_id: google-research-datasets/mbpp
    target_tokens: 30000000

  - name: code_feedback
    type: instruct
    mix_role: mixed_instruct
    hf_id: HuggingFaceH4/Code-Feedback
    target_tokens: 50000000

  - name: taco
    type: instruct
    mix_role: mixed_instruct
    hf_id: BAAI/TACO
    target_tokens: 60000000

  - name: magicoder_evol
    type: instruct
    mix_role: mixed_instruct
    hf_id: ise-uiuc/Magicoder-Evol-Instruct-110K
    target_tokens: 70000000

  - name: magicoder_oss
    type: instruct
    mix_role: mixed_instruct
    hf_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    target_tokens: 90000000

  - name: fineweb_edu
    type: base
    mix_role: base
    hf_id: HuggingFaceFW/fineweb-edu
    target_tokens: 500000000

  - name: code_search_net
    type: base
    mix_role: base
    hf_id: claudios/code_search_net
    target_tokens: 700000000

  - name: github_code_clean
    type: base
    mix_role: base
    hf_id: codeparrot/github-code-clean
    target_tokens: 3000000000

  - name: starcoderdata
    type: base
    mix_role: base
    hf_id: bigcode/starcoderdata
    target_tokens: 5500000000
