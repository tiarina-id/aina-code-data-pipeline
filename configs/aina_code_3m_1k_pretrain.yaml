project_name: aina-1-code-3m-1k-pretrain
output_mode: pretrain
artifact_format: tokenized_binary_shards
target_tokens: 18000000
sequence_length: 1024
tokens_per_sample: 1024
loss_shift: model_internal
val_ratio: 0.001
seed: 42

tokenizer_path: /data/aina-code/tokenizers/gpt2-8k-chat
output_dir: /data/aina-code/datasets/aina-1-code-3m-1k/pretrain
work_dir: /data/aina-code/work/aina-1-code-3m-1k/pretrain
progress_path: /data/aina-code/work/aina-1-code-3m-1k/pretrain/progress.json
report_path: /data/aina-code/work/aina-1-code-3m-1k/pretrain/reports/dataset_report.json

s3_output: s3://aina-code/v1/datasets/aina-1-code-3m-1k/pretrain/

base_ratio: 0.97
mixed_instruct_ratio: 0.03
checkpoint_interval_tokens: 1000000
s3_upload_interval_tokens: 1000000
shard_sequences: 4096
write_intermediate_jsonl: false
num_workers: 2
worker_batch_size: 16
worker_start_method: fork
log_interval_seconds: 60

sources:
  - name: mbpp
    type: instruct
    mix_role: mixed_instruct
    hf_id: google-research-datasets/mbpp
    target_tokens: 54000

  - name: code_feedback
    type: instruct
    mix_role: mixed_instruct
    hf_id: HuggingFaceH4/Code-Feedback
    target_tokens: 90000

  - name: taco
    type: instruct
    mix_role: mixed_instruct
    hf_id: BAAI/TACO
    target_tokens: 108000

  - name: magicoder_evol
    type: instruct
    mix_role: mixed_instruct
    hf_id: ise-uiuc/Magicoder-Evol-Instruct-110K
    target_tokens: 126000

  - name: magicoder_oss
    type: instruct
    mix_role: mixed_instruct
    hf_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    target_tokens: 162000

  - name: fineweb_edu
    type: base
    mix_role: base
    hf_id: HuggingFaceFW/fineweb-edu
    target_tokens: 900000

  - name: code_search_net
    type: base
    mix_role: base
    hf_id: claudios/code_search_net
    target_tokens: 1260000

  - name: github_code_clean
    type: base
    mix_role: base
    hf_id: codeparrot/github-code-clean
    data_file_limit: 16
    target_tokens: 5400000

  - name: starcoderdata
    type: base
    mix_role: base
    hf_id: bigcode/starcoderdata
    target_tokens: 9900000
