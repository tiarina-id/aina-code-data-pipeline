project_name: aina-code-50m-sft
output_mode: sft_jsonl
artifact_format: jsonl_messages
target_tokens: 10000000
sequence_length: 2048
val_ratio: 0.01
seed: 42

tokenizer_path: /data/aina-tokenizer
fallback_tokenizer: gpt2
output_dir: /data/aina-dataset/sft/aina-code-50m-instruct-v1
work_dir: /data/aina-dataset/work/sft-50m
progress_path: /data/aina-dataset/work/sft-50m/progress.json
report_path: /data/aina-dataset/work/sft-50m/reports/dataset_report.json

s3_output: s3://aina-code-datasets/v1/sft/aina-code-50m-instruct-v1/

checkpoint_interval_tokens: 1000000
s3_upload_interval_tokens: 1000000
sft_samples_per_shard: 10000
num_workers: 8
worker_batch_size: 32
worker_start_method: fork
log_interval_seconds: 60

sources:
  - name: mbpp
    type: instruct
    mix_role: instruct_only
    hf_id: google-research-datasets/mbpp
    target_tokens: 100000

  - name: taco
    type: instruct
    mix_role: instruct_only
    hf_id: BAAI/TACO
    target_tokens: 200000

  - name: magicoder_evol
    type: instruct
    mix_role: instruct_only
    hf_id: ise-uiuc/Magicoder-Evol-Instruct-110K
    target_tokens: 700000

  - name: magicoder_oss
    type: instruct
    mix_role: instruct_only
    hf_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    target_tokens: 1000000

  - name: code_feedback
    type: instruct
    mix_role: instruct_only
    hf_id: HuggingFaceH4/Code-Feedback
    target_tokens: 1500000

  - name: opencodeinstruct
    type: instruct
    mix_role: instruct_only
    hf_id: nvidia/OpenCodeInstruct
    target_tokens: 6500000
