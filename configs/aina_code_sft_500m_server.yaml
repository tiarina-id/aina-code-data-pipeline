project_name: aina-code-500m-8k-sft
output_mode: sft_jsonl
artifact_format: jsonl_messages
target_tokens: 100000000
sequence_length: 8192
val_ratio: 0.01
seed: 42

tokenizer_path: /data/aina-tokenizer
fallback_tokenizer: gpt2
output_dir: /data/aina-dataset/sft/aina-code-500m-instruct-v1-8k
work_dir: /data/aina-dataset/work/sft-500m-8k
progress_path: /data/aina-dataset/work/sft-500m-8k/progress.json
report_path: /data/aina-dataset/work/sft-500m-8k/reports/dataset_report.json

s3_output: s3://aina-code-datasets/v1/sft/aina-code-500m-instruct-v1-8k/

checkpoint_interval_tokens: 10000000
s3_upload_interval_tokens: 10000000
sft_samples_per_shard: 10000
log_interval_seconds: 60

sources:
  - name: mbpp
    type: instruct
    mix_role: instruct_only
    hf_id: google-research-datasets/mbpp
    target_tokens: 1000000

  - name: taco
    type: instruct
    mix_role: instruct_only
    hf_id: BAAI/TACO
    target_tokens: 2000000

  - name: magicoder_evol
    type: instruct
    mix_role: instruct_only
    hf_id: ise-uiuc/Magicoder-Evol-Instruct-110K
    target_tokens: 7000000

  - name: magicoder_oss
    type: instruct
    mix_role: instruct_only
    hf_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    target_tokens: 10000000

  - name: code_feedback
    type: instruct
    mix_role: instruct_only
    hf_id: HuggingFaceH4/Code-Feedback
    target_tokens: 15000000

  - name: opencodeinstruct
    type: instruct
    mix_role: instruct_only
    hf_id: nvidia/OpenCodeInstruct
    target_tokens: 65000000
